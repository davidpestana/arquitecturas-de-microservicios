services:
  consul:
    image: hashicorp/consul:1.19
    container_name: consul-dev
    ports:
      - "8500:8500"   # Web UI
      - "8600:8600/udp" # DNS interno
      - "8300:8300"   # RPC server
      - "8301:8301"   # LAN serf
      - "8302:8302"   # WAN serf
    command: ["agent", "-dev", "-client=0.0.0.0", "-ui"]
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - consul-net

  servicioA:
    image: node:20-alpine
    container_name: servicio-a
    working_dir: /app
    volumes:
      - ./servicioA:/app
    command: sh -c "npm install && npm start"
    environment:
      - PORT=3001
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - SERVICE_ADDRESS=servicioA
    depends_on:
      consul:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - consul-net

  servicioB:
    image: node:20-alpine
    container_name: servicio-b
    working_dir: /app
    volumes:
      - ./servicioB:/app
    command: sh -c "npm install && npm start"
    environment:
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
    depends_on:
      consul:
        condition: service_healthy
      servicioA:
        condition: service_started
    networks:
      - consul-net

networks:
  consul-net:
    driver: bridge
